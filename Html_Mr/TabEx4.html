
<html>
    <head>

    </head>
<body>
    <form name="frmData">
        <fieldset>
            <legend>Wipro Employ Information</legend>
           <table border="3" align="center">
            <tr>
                <th>First Name</th>
                <td>
 <input type="text" name="firstName" placeholder="Please Enter FirstName" /> 
                </td>
            </tr>
             <tr>
                <th>Last Name</th>
                <td>
                    <input type="text" name="lastName" placeholder="Please Enter LastName" />
                </td>
             </tr>
            <tr>
                <th>Age</th>
                <td>
<input type="number" name="age" max="100" min="1" 
                    placeholder="Please Enter Age"
                    />
                </td>
            </tr>
              <tr>
                <th>Date Of Birth</th>
                <td>
  <input type="date" name="dob"
                    placeholder="Please Enter Date of Birth"
                    /> 
                </td>
              </tr>
                <tr>
                    <th>
                        Email
                    </th>
                    <td>
 <input type="email" name="email"
                    placeholder="Please Enter Email" required />
                    </td>
                </tr>
                <tr>
                    <th>
                        Url
                    </th>
                    <td>
<input type="url" name="url"
                    placeholder="Please Enter Url" required />
                    </td>
                </tr>
                <tr>
                    <th colspan="2">
   <input type="submit" value="Show" />
                    </th>
                </tr>
             
                
                </table>
        </fieldset>
    </form>
</body>
</html>
