<html>
    <head>
        <script>
            const sum = async =(a,b) => {
                return a + b;
            }

            const sub = async = (a,b) => {
                return a - b;
            }
            
            const mult = async = (a, b) => {
                return a * b;
            }
        </script>
    </head>
<body>
    <input type="button" value="Sum" onclick="alert(sum(12,5))" /> 
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <input type="button" value="Sub" onclick="alert(sub(12,5))" />
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <input type="button" value="Mult" onclick="alert(mult(12,5))" />
</body>
</html>
